[ollama]
# Private local settings only.
# Copy this file to `settings.cfg` and edit values for your environment.

# Base URL for your Ollama server.
base_url = http://localhost:11434

# Optional API key for hosted/authenticated Ollama endpoints.
api_key =

# Comma-separated models for verify_ollama.py.
verify_models = tinyllama:latest,mistral-small3.2:latest,qwen3:8b

# Verify script behavior.
use_chat = true

# Optional integration test toggles/default models.
enable_integration_tests = false
test_text_model = tinyllama:latest
test_embed_model = mxbai-embed-large:latest
